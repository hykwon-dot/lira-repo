<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 외부 원형 네트워크 -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#1e40af" stroke-width="2" opacity="0.3"/>
  
  <!-- 네트워크 연결선들 -->
  <g stroke="#1e40af" stroke-width="1.5" opacity="0.6">
    <line x1="20" y1="30" x2="35" y2="45"/>
    <line x1="80" y1="30" x2="65" y2="45"/>
    <line x1="30" y1="70" x2="45" y2="55"/>
    <line x1="70" y1="70" x2="55" y2="55"/>
    <line x1="15" y1="50" x2="35" y2="50"/>
    <line x1="85" y1="50" x2="65" y2="50"/>
  </g>
  
  <!-- 네트워크 노드들 -->
  <g fill="#1e40af">
    <circle cx="20" cy="30" r="3"/>
    <circle cx="80" cy="30" r="3"/>
    <circle cx="30" cy="70" r="3"/>
    <circle cx="70" cy="70" r="3"/>
    <circle cx="15" cy="50" r="2"/>
    <circle cx="85" cy="50" r="2"/>
  </g>
  
  <!-- 중앙 메인 원 -->
  <circle cx="50" cy="50" r="25" fill="#1e40af"/>
  
  <!-- 사람 아이콘 (탐정/조사원) -->
  <g fill="white">
    <!-- 머리 -->
    <circle cx="45" cy="40" r="6"/>
    <!-- 몸 -->
    <ellipse cx="45" cy="58" rx="8" ry="12"/>
    
    <!-- 돋보기 -->
    <circle cx="60" cy="45" r="8" fill="none" stroke="white" stroke-width="2"/>
    <line x1="66" y1="51" x2="70" y2="55" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- AI 요소 (작은 점들) -->
  <g fill="#60a5fa" opacity="0.8">
    <circle cx="35" cy="35" r="1.5"/>
    <circle cx="65" cy="35" r="1.5"/>
    <circle cx="35" cy="65" r="1.5"/>
    <circle cx="65" cy="65" r="1.5"/>
  </g>
</svg>